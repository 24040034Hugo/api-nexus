<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Nexus | Full Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Bebas+Neue&family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="landing" class="page active" style="text-align: center; padding-top: 20vh;">
    <h1 class="hero-title">API NEXUS</h1>
    <p style="color: var(--accent); font-family: 'Space Mono';">[ ALL APIS INTEGRATED ]</p>
    <button class="btn-action" onclick="goToDashboard()" style="margin-top: 30px; font-size: 1.5rem;">ENTRAR AL PANEL</button>
  </div>

  <div id="dashboard" class="page" style="display: none;">
    <aside class="sidebar">
      <h2 style="color: var(--accent); font-family: 'Bebas Neue'; text-align: center;">MENU</h2>
      <nav style="margin-top: 30px;">
        <button class="sb-btn" onclick="showSec('sec-geo')">MAPA</button>
        <button class="sb-btn" onclick="showSec('sec-redes')">GITHUB</button>
        <button class="sb-btn" onclick="showSec('sec-ecomm')">E-COMMERCE</button>
        <button class="sb-btn" onclick="showSec('sec-reg')">REGISTROS</button>
        <button class="sb-btn" onclick="showSec('sec-notis')">NOTIFICACIONES</button>
        <button class="sb-btn" onclick="showSec('sec-stream')">STREAMING</button>
      </nav>
      <button onclick="location.reload()" style="background:red; color:white; border:none; width:100%; padding:10px; margin-top:20vh; border-radius:8px;">SALIR</button>
    </aside>

    <main class="content">
      <section id="sec-geo" class="sec activa">
        <h2 class="hero-title" style="font-size: 2rem;">GEOLOCALIZACIÓN</h2>
        <div class="card-glass" style="height: 450px;" id="map"></div>
      </section>

      <section id="sec-redes" class="sec">
        <h2 class="hero-title" style="font-size: 2rem;">GITHUB EXPLORER</h2>
        <div class="card-glass">
          <div style="display:flex; gap:10px;">
            <input type="text" id="github-input" placeholder="Usuario...">
            <button id="github-btn" class="btn-action">BUSCAR</button>
          </div>
          <div id="perfil-card" style="display:none; margin-top:20px; text-align:center;">
            <img id="perfil-avatar" src="" style="width:100px; border-radius:50%; border:2px solid var(--accent);">
            <h3 id="perfil-nombre" style="color:var(--accent);"></h3>
            <p id="perfil-bio"></p>
            <p>Repos: <span id="stat-repos"></span> | Followers: <span id="stat-followers"></span></p>
          </div>
        </div>
      </section>

      <section id="sec-ecomm" class="sec">
        <h2 class="hero-title" style="font-size: 2rem;">TIENDA VIRTUAL</h2>
        <div class="card-glass">
          <div style="display:flex; gap:10px;">
            <input type="text" id="ecomm-input" placeholder="Buscar producto...">
            <button id="ecomm-btn" class="btn-action">FILTRAR</button>
          </div>
          <div id="ecomm-grid" class="ecomm-grid"></div>
        </div>
      </section>

      <section id="sec-reg" class="sec">
        <h2 class="hero-title" style="font-size: 2rem;">REGISTROS CLOUD</h2>
        <div class="card-glass">
          <form id="msj-form">
            <input type="text" id="msj-nombre" placeholder="Nombre" required>
            <input type="text" id="msj-carrera" placeholder="Carrera" required>
            <button type="submit" class="btn-action">GUARDAR</button>
          </form>
          <div id="msj-lista" style="margin-top:20px;"></div>
        </div>
      </section>

      <section id="sec-notis" class="sec">
        <h2 class="hero-title" style="font-size: 2rem;">ENVÍO DE ALERTAS</h2>
        <div class="card-glass">
          <form id="notis-form">
            <input type="email" id="notis-to" placeholder="Correo" required>
            <input type="text" id="notis-subject" placeholder="Asunto" required>
            <textarea id="notis-message" placeholder="Mensaje..."></textarea>
            <button type="submit" id="notis-btn" class="btn-action">ENVIAR</button>
          </form>
        </div>
      </section>

      <section id="sec-stream" class="sec">
        <h2 class="hero-title" style="font-size: 2rem;">MUSIC PLAYER</h2>
        <div class="card-glass">
          <div style="display:flex; gap:10px;">
            <input type="text" id="stream-input" placeholder="Artista...">
            <button id="stream-btn" class="btn-action">PLAY</button>
          </div>
          <div id="stream-player" style="display:none; margin-top:20px; background:rgba(0,0,0,0.4); padding:15px; border-radius:10px;">
            <img id="player-img" src="" style="width:50px;">
            <h4 id="player-title"></h4>
            <audio id="player-audio" controls></audio>
          </div>
          <div id="stream-grid" class="stream-grid"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="geo.js"></script>
  <script src="main.js"></script>
  <script src="redes.js"></script>
  <script src="ecomm.js"></script>
  <script type="module" src="registrar.js"></script>
  <script src="notify.js"></script>
  <script src="streaming.js"></script>

  <script>
    function goToDashboard() {
      document.getElementById('landing').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      setTimeout(() => { if(window.initGeo) initGeo(); }, 300);
    }
    function showSec(id) {
      document.querySelectorAll('.sec').forEach(s => s.classList.remove('activa'));
      document.getElementById(id).classList.add('activa');
    }
  </script>
</body>
</html>
