<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Nexus | Premium Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="landing" class="page active" style="text-align: center; padding-top: 20vh;">
    <div class="hero-container">
      <p style="letter-spacing: 8px; color: var(--accent); font-family: 'Space Mono';">[ SYSTEM ONLINE ]</p>
      <h1 class="hero-title">API NEXUS</h1>
      <p style="max-width: 600px; margin: 20px auto; color: var(--text-dim); line-height: 1.6;">
        Acceso premium a la plataforma de integración de microservicios. 
        Visualización de datos en tiempo real con tecnología Glassmorphism.
      </p>
      <button class="btn-action" onclick="goToDashboard()" style="margin-top: 30px; font-size: 1.8rem;">
        INICIAR SESIÓN
      </button>
    </div>
  </div>

  <div id="dashboard" class="page" style="display: none;">
    <aside class="sidebar">
      <div style="font-family: 'Bebas Neue'; font-size: 2rem; color: var(--accent); margin-bottom: 40px; text-align: center;">
        API·NEXUS
      </div>
      <nav>
        <button class="sb-btn" onclick="showSec('sec-geo')">MUNDO / MAPAS</button>
        <button class="sb-btn" onclick="showSec('sec-redes')">GITHUB SCANNER</button>
      </nav>
      <div style="margin-top: 45vh;">
        <button onclick="location.reload()" style="background:transparent; color:#ff4444; border:1px solid #ff4444; width:100%; padding:10px; cursor:pointer; font-family:'Bebas Neue'; border-radius: 8px;">CERRAR SISTEMA</button>
      </div>
    </aside>

    <main class="content">
      <section id="sec-geo" class="sec activa">
        <h2 class="hero-title" style="font-size: 2.5rem; margin-bottom: 20px;">GEOLOCALIZACIÓN</h2>
        <div class="card-glass" style="height: 550px; padding: 0; overflow: hidden; border-width: 2px;">
          <div id="map" style="height: 100%; width: 100%;"></div>
        </div>
      </section>

      <section id="sec-redes" class="sec">
        <h2 class="hero-title" style="font-size: 2.5rem; margin-bottom: 20px;">GITHUB EXPLORER</h2>
        <div class="card-glass">
          <div style="display: flex; gap: 15px; margin-bottom: 30px;">
            <input type="text" id="github-input" placeholder="Ingresa usuario (ej: 24040034hugo)..." style="flex: 1;">
            <button id="github-btn" class="btn-action">BUSCAR</button>
          </div>
          
          <div id="perfil-card" style="display:none; animation: fadeIn 0.5s;">
            <div style="display: flex; align-items: center; gap: 30px;">
              <img id="perfil-avatar" src="" style="width: 130px; height: 130px; border-radius: 50%; border: 4px solid var(--accent); box-shadow: 0 0 20px var(--accent-glow);">
              <div>
                <h3 id="perfil-nombre" style="font-size: 2.5rem; margin: 0; font-family: 'Bebas Neue'; color: var(--accent);"></h3>
                <p id="perfil-username" style="font-family: 'Space Mono'; color: #888; margin-bottom: 10px;"></p>
                <p id="perfil-bio" style="font-style: italic; color: #ccc; max-width: 400px;"></p>
              </div>
            </div>
            <div style="display: flex; gap: 40px; margin-top: 30px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 15px;">
              <div style="text-align: center;"><span id="stat-repos" style="font-size: 2rem; color: var(--accent); font-weight: bold;"></span><br><small style="color: #666;">REPOS</small></div>
              <div style="text-align: center;"><span id="stat-followers" style="font-size: 2rem; color: var(--accent); font-weight: bold;"></span><br><small style="color: #666;">FOLLOWERS</small></div>
            </div>
          </div>
          <p id="perfil-error" style="display:none; color: #ff4444; margin-top: 20px; font-family: 'Space Mono';">⚠️ USUARIO NO ENCONTRADO</p>
        </div>
      </section>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="geo.js"></script>
  <script src="redes.js"></script>
  
  <script>
    function goToDashboard() {
      document.getElementById('landing').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      setTimeout(() => { 
        if(typeof initGeo === 'function') initGeo(); 
      }, 300);
    }

    function showSec(id) {
      document.querySelectorAll('.sec').forEach(s => s.classList.remove('activa'));
      document.getElementById(id).classList.add('activa');
    }
  </script>
</body>
</html>
