<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Nexus | Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Bebas+Neue&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="landing" class="page active" style="text-align: center; padding-top: 20vh;">
    <h1 class="hero-title">API NEXUS</h1>
    <p style="color: var(--accent); font-family: 'Space Mono';">[ SYSTEM ONLINE ]</p>
    <button class="btn-action" onclick="goToDashboard()" style="margin-top: 30px; font-size: 1.5rem;">INICIAR PANEL</button>
  </div>

  <div id="dashboard" class="page" style="display: none;">
    <aside class="sidebar">
      <div style="font-family: 'Bebas Neue'; font-size: 2rem; color: var(--accent); text-align: center; margin-bottom: 40px;">API·NEXUS</div>
      <nav>
        <button class="sb-btn active" onclick="showSec('sec-geo')">MUNDO / MAPA</button>
        <button class="sb-btn" onclick="showSec('sec-redes')">GITHUB</button>
        <button class="sb-btn" onclick="showSec('sec-ecomm')">TIENDA</button>
        <button class="sb-btn" onclick="showSec('sec-reg')">BASE DE DATOS</button>
        <button class="sb-btn" onclick="showSec('sec-notis')">CORREO</button>
        <button class="sb-btn" onclick="showSec('sec-stream')">MÚSICA</button>
      </nav>
    </aside>

    <main class="content">
      <section id="sec-geo" class="sec activa">
        <h2 class="hero-title" style="font-size: 2.5rem;">GEOLOCALIZACIÓN</h2>
        <div class="card-glass" style="height: 500px; padding: 0;" id="map"></div>
      </section>

      <section id="sec-redes" class="sec">
        <h2 class="hero-title" style="font-size: 2.5rem;">GITHUB EXPLORER</h2>
        <div class="card-glass">
          <div style="display:flex; gap:10px;">
            <input type="text" id="github-input" placeholder="Usuario...">
            <button id="github-btn" class="btn-action">BUSCAR</button>
          </div>
          <div id="perfil-card" style="display:none; margin-top:20px;">
            <img id="perfil-avatar" src="" style="width:100px; border-radius:50%; border:3px solid var(--accent);">
            <h3 id="perfil-nombre" style="color:var(--accent);"></h3>
            <p id="perfil-bio"></p>
          </div>
        </div>
      </section>

      <section id="sec-ecomm" class="sec">
        <h2 class="hero-title" style="font-size: 2.5rem;">E-COMMERCE</h2>
        <div class="card-glass">
          <input type="text" id="ecomm-input" placeholder="Buscar producto...">
          <div id="ecomm-grid" class="ecomm-grid"></div>
        </div>
      </section>

      <section id="sec-reg" class="sec">
        <h2 class="hero-title" style="font-size: 2.5rem;">REGISTROS SUPABASE</h2>
        <div class="card-glass">
          <form id="msj-form">
            <input type="text" id="msj-nombre" placeholder="Nombre" required>
            <input type="text" id="msj-carrera" placeholder="Carrera" required>
            <button type="submit" class="btn-action">GUARDAR</button>
          </form>
          <div id="msj-lista" style="margin-top:20px;"></div>
        </div>
      </section>

      <section id="sec-notis" class="sec">
        <h2 class="hero-title" style="font-size: 2.5rem;">NOTIFICACIONES</h2>
        <div class="card-glass">
          <form id="notis-form">
            <input type="email" id="notis-to" placeholder="Correo" required>
            <input type="text" id="notis-subject" placeholder="Asunto" required>
            <textarea id="notis-message" placeholder="Mensaje..."></textarea>
            <button type="submit" id="notis-btn" class="btn-action">ENVIAR</button>
          </form>
        </div>
      </section>

      <section id="sec-stream" class="sec">
        <h2 class="hero-title" style="font-size: 2.5rem;">STREAMING AUDIO</h2>
        <div class="card-glass">
          <input type="text" id="stream-input" placeholder="Artista...">
          <div id="stream-player" style="display:none; margin:20px 0; background:rgba(0,0,0,0.5); padding:15px; border-radius:10px;">
             <h4 id="player-title"></h4>
             <audio id="player-audio" controls></audio>
          </div>
          <div id="stream-grid" class="stream-grid"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="geo.js"></script>
  <script src="redes.js"></script>
  <script src="ecomm.js"></script>
  <script type="module" src="registrar.js"></script>
  <script src="notify.js"></script>
  <script src="streaming.js"></script>

  <script>
    function goToDashboard() {
      document.getElementById('landing').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      setTimeout(() => { if(window.initGeo) initGeo(); }, 300);
    }
    function showSec(id) {
      document.querySelectorAll('.sec').forEach(s => s.classList.remove('activa'));
      document.querySelectorAll('.sb-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.add('activa');
      event.target.classList.add('active');
    }
  </script>
</body>
</html>
